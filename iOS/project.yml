name: WhiskeyShelf
options:
  bundleIdPrefix: com.shimondeitel.whiskeyshelf
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  WhiskeyShelf:
    type: application
    platform: iOS
    sources:
      - path: WhiskeyShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.whiskeyshelf
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: WhiskeyShelf/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WhiskeyShelfTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WhiskeyShelfTests
      - path: WhiskeyShelf.storekit
    dependencies:
      - target: WhiskeyShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.whiskeyshelf.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WhiskeyShelfUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WhiskeyShelfUITests
    dependencies:
      - target: WhiskeyShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.whiskeyshelf.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  WhiskeyShelf:
    build:
      targets:
        WhiskeyShelf: all
        WhiskeyShelfTests: [test]
        WhiskeyShelfUITests: [test]
    test:
      targets:
        - WhiskeyShelfTests
        - WhiskeyShelfUITests
